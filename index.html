<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SZZXT STORE</title>

<link rel="icon" type="image/png" href="LOGOO-removebg-preview.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.05),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(255,255,255,.04),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(255,255,255,.03),transparent 30%);
z-index:-3;
}

body::after{
content:"";
position:fixed;
top:50%;
left:50%;
width:850px;
height:850px;
transform:translate(-50%,-50%);
background:url("LOGOO-removebg-preview.png") center center no-repeat;
background-size:contain;
opacity:.14;
filter:drop-shadow(0 0 45px #fff);
z-index:-2;
pointer-events:none;
}

header{
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #fff;
border-bottom:none;
box-shadow:0 -2px 18px #fff;
background:rgba(0,0,0,.82);
position:sticky;
top:0;
z-index:999;
backdrop-filter:blur(8px);
}

.logo-small{
width:70px;
filter:drop-shadow(0 0 14px #fff);
}

nav a{
text-decoration:none;
color:#000;
background:#fff;
padding:12px 18px;
margin-left:10px;
border-radius:12px;
font-weight:900;
box-shadow:0 0 14px #fff;
transition:.2s;
}

nav a:hover{
transform:translateY(-2px) scale(1.03);
}

.hero{
text-align:center;
padding:70px 20px 30px;
}

.hero-logo{
width:260px;
max-width:90%;
filter:drop-shadow(0 0 24px #fff);
}

.hero h1{
font-size:4rem;
letter-spacing:8px;
margin-top:20px;
text-shadow:0 0 18px #fff;
}

.hero p{
margin-top:14px;
color:#ddd;
font-size:1.1rem;
}

.section-title{
text-align:center;
font-size:2.2rem;
letter-spacing:5px;
margin-top:40px;
margin-bottom:20px;
text-shadow:0 0 15px #fff;
}

.category-title{
text-align:center;
font-size:1.6rem;
letter-spacing:4px;
margin:35px 0 25px;
text-shadow:0 0 12px #fff;
}

.products{
width:95%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
padding-bottom:45px;
}

.card{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.7);
border-radius:18px;
padding:16px;
text-align:center;
box-shadow:0 0 18px rgba(255,255,255,.35);
transition:.25s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 28px #fff;
}

/* 🔥 AQUI ESTA EL FIX 🔥 */
.product-img{
width:100%;
height:180px;
object-fit:contain;
background:#000;
border-radius:14px;
margin-bottom:14px;
border:1px solid #fff;
box-shadow:0 0 18px rgba(255,255,255,.35);
padding:6px;
}

.card h2{
font-size:1.2rem;
margin-bottom:10px;
}

.card p{
font-size:.95rem;
color:#d7d7d7;
margin-bottom:8px;
}

.price{
font-size:1.05rem;
font-weight:900;
color:#fff;
text-shadow:0 0 10px #fff;
margin-top:10px;
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:12px 18px;
background:#fff;
color:#000;
font-weight:900;
text-decoration:none;
border-radius:12px;
box-shadow:0 0 14px #fff;
transition:.2s;
}

.btn:hover{
transform:scale(1.04);
}

footer{
margin-top:50px;
padding:30px;
text-align:center;
border-top:1px solid #fff;
box-shadow:0 0 18px #fff;
background:rgba(0,0,0,.82);
}

footer img{
width:80px;
margin-bottom:14px;
filter:drop-shadow(0 0 14px #fff);
}

footer p{
color:#ddd;
margin-top:6px;
}

@media(max-width:768px){
header{
flex-direction:column;
gap:15px;
padding:20px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

nav a{
margin:0;
}

.hero h1{
font-size:2.4rem;
letter-spacing:4px;
}

.hero-logo{
width:180px;
}

body::after{
width:500px;
height:500px;
opacity:.12;
}
}
</style>
</head>

<body>

<header>
<img src="LOGOO-removebg-preview.png" class="logo-small">

<nav>
<a href="https://discord.gg/vRx8B9wEQu" target="_blank">Discord</a>
<a href="#products">Products</a>
<a href="#support">Support</a>
</nav>
</header>

<section class="hero">
<img src="LOGOO-removebg-preview.png" class="hero-logo">
<h1>SZZXT STORE</h1>
<p>Premium Digital Products • Instant Delivery</p>
</section>

<h2 class="section-title" id="products">PRODUCTS</h2>

<h3 class="category-title">UTILITY ACCOUNTS</h3>

<section class="products">
